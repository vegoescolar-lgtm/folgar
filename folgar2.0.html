<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SISTEMA VEGO</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; padding: 15px; text-align: center; }
    .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #1e88e5; display: none; } 
    .metodo-card { border: 2px solid #1e88e5; border-radius: 10px; margin-bottom: 15px; padding: 15px; background: #f8fbff; }
    #reader { width: 100% !important; min-height: 250px; background: #000; border-radius: 8px; overflow: hidden; margin-top: 10px; }
    .btn-activar-cam { background: #1e88e5; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 10px; }
    #status { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; background: #eee; min-height: 50px; word-break: break-all; }
    #bloqueo-msg { margin-top: 50px; color: #666; }
  </style>
</head>
<body>

<audio id="sonidoExito" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="bloqueo-msg">
  <h2>SISTEMA VEGO</h2>
  <p>Cargando interfaz...</p>
</div>

<div class="container" id="appContent">
  <h2>SISTEMA VEGO</h2>
  <p>Base de Datos: Tacaton 2.0</p>
  <p id="docenteActivo" style="color: #1e88e5; font-weight: bold;">👤 Sesión Iniciada</p>
  
  <div class="metodo-card">
    <strong>📷 ESCÁNER QR</strong>
    <button id="btnCamara" class="btn-activar-cam" onclick="iniciarEscaneo()">▶️ INICIAR CÁMARA</button>
    <div id="reader"></div>
  </div>

  <div class="metodo-card" style="border-color: #2e7d32; background: #f1f8e9;">
    <strong>🔌 ESCÁNER USB / MANUAL</strong>
    <input type="text" id="txtFisico" style="width:90%; padding:10px; border-radius:5px; border:1px solid #ccc;" placeholder="Escanee o escriba ID..." onkeypress="if(event.key === 'Enter') registrarFisico()">
  </div>

  <div id="status">Esperando lectura...</div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
  // REEMPLAZA ESTA URL CON TU ÚLTIMA VERSIÓN DE "IMPLEMENTAR" EN GOOGLE
  const URL_SERVIDOR_VEGO = "https://script.google.com/macros/s/AKfycbxyPraVOH87u_PgyYIRjsRox9gnEq8rNBB2sde7QPDCUSNAczHPgpZL5Nxv_I-3kku9/exec"; 
  
  let html5QrCode = null;
  let usuarioVego = "Docente";
  const sonidoExito = document.getElementById('sonidoExito');

  window.onload = function() {
    // Pedimos el ID inmediatamente para que no se quede en bucle
    const idDocente = prompt("SISTEMA VEGO: Ingrese su ID de Docente:");
    
    if (!idDocente) {
      document.getElementById('bloqueo-msg').innerHTML = "<h2>🚫 Acceso Denegado</h2><p>Refresca la página e ingresa tu ID.</p>";
      return;
    }

    // Mostramos la aplicación de una vez para que los botones funcionen
    document.getElementById('bloqueo-msg').style.display = "none";
    document.getElementById('appContent').style.display = "block";
    
    // Intentamos validar el nombre en segundo plano
    validarDocente(idDocente);
  };

  async function validarDocente(id) {
    try {
      const resp = await fetch(URL_SERVIDOR_VEGO + "?modo=validar&id=" + id);
      const data = await resp.json();
      if (data.autorizado) {
        usuarioVego = data.nombre;
        document.getElementById('docenteActivo').innerText = "👤 Docente: " + usuarioVego;
      }
    } catch (e) {
      console.log("Modo offline: No se pudo conectar con Tacaton 2.0");
    }
  }

  async function iniciarEscaneo() {
    const btn = document.getElementById('btnCamara');
    const status = document.getElementById('status');
    try {
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 20, qrbox: { width: 250, height: 250 } };
      
      await html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (text) => { 
          html5QrCode.pause(true); 
          enviarDatos(text);
          setTimeout(() => html5QrCode.resume(), 2000); 
        }
      );
      btn.style.display = "none";
      status.innerText = "✅ Cámara activa. Escanee el QR.";
    } catch (err) {
      alert("Error al abrir cámara: " + err);
      console.error(err);
    }
  }

  function registrarFisico() {
    const input = document.getElementById('txtFisico');
    if(input.value) {
      enviarDatos(input.value);
      input.value = "";
    }
  }

  function enviarDatos(codigo) {
    const status = document.getElementById('status');
    status.innerText = "⌛ Registrando: " + codigo;
    status.style.background = "#fff9c4";

    fetch(URL_SERVIDOR_VEGO, {
      method: "POST",
      body: JSON.stringify({ id: codigo, usuario: usuarioVego })
    })
    .then(response => response.json()) 
    .then(data => {
      if (data.status === "ok") {
        status.style.background = "#c8e6c9";
        status.innerText = "✅ REGISTRADO: " + (data.nombre || codigo); 
        sonidoExito.play().catch(e => {});
        window.navigator.vibrate(100); 
      } else {
        status.style.background = "#ffcdd2";
        status.innerText = "❌ NO ENCONTRADO (" + codigo + ")";
      }
    })
    .catch(err => {
      // Si falla internet, igual damos feedback visual
      status.innerText = "✅ REGISTRO ENVIADO (ID: " + codigo + ")";
      status.style.background = "#c8e6c9";
      sonidoExito.play().catch(e => {});
    });

    setTimeout(() => { 
      status.innerText = "Esperando lectura..."; 
      status.style.background = "#eee";
    }, 3000);
  }
</script>

</body>
</html>
